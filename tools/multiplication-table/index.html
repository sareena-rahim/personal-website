<html>
<head>
     <title>Multiplication Table</title>
	 <style>
	       body {
				font-family: Arial, sans-serif;
				background: #0f172a;
				color: white;
				min-height: 100vh;
				margin: 0;
				
				 padding: 30px;

				display: flex;
				flex-direction: column;
				align-items: center;
			}
			input {
				padding: 8px;
				font-size: 16px;
				width: 200px;
				margin-bottom: 10px;
            }
			
			button {
				padding: 8px 16px;
				font-size: 16px;
				cursor: pointer;
            }
			#container {
				margin-top: 30px;
				display: grid;
				grid-template-columns: repeat(5, 1fr);
				gap: 15px;
                width: 100%;
                max-width: 1100px;
            }
			
			.box {
				background: #1e293b;
				padding: 8px;
				border-radius: 8px;
			}
			.row {
				margin-bottom: 4px;
				font-size: 14px;
            }

            .row {
				display: flex;
				justify-content: center;
				gap: 6px;
				margin-bottom: 4px;
				font-size: 14px;
			}


	 
	 </style>
	 
</head>

<body>
    <h1>Multiplication Table</h1>
    <input type="number" id="numberInput" placeholder="Enter a number">
    <button onclick="generateTable()">Generate</button>
	<div id="container"></div>
	
	<script>
	    
		function generateTable() {
	        const num = Number(document.getElementById("numberInput").value);
			const container = document.getElementById("container");
			
			container.innerHTML = ""; // clear previous result
			
			if (isNaN(num)) {
    
                return;
            }
			
			let box;
			
			for (let i = 1; i <= 100; i++) {
			
			    if ((i - 1) % 10 == 0) {
                    box = document.createElement("div");
                    box.className = "box";
                    container.appendChild(box);
                }
				
			    const row = document.createElement("div");
				row.className = "row";
				row.innerHTML = `
                    <span>${i}</span>
                    <span>×</span>
                    <span>${num}</span>
                    <span>=</span>
                    <span>${i * num}</span>
                `;

				box.appendChild(row);
			}
		} 	 
	</script>

</body>
</html>
