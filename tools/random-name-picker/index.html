<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Name Picker · Sareena Rahim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f0e0d;
            --ink-soft: #3a3835;
            --ink-muted: #7a7672;
            --paper: #f5f2ed;
            --paper-warm: #ede9e2;
            --paper-card: #f9f7f4;
            --accent: #c0392b;
            --accent-warm: #e67e22;
            --accent-cool: #2c7a6e;
            --rule: rgba(15,14,13,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.4;
        }

        /* ─── HEADER ─── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(245,242,237,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--rule);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 7%; max-width: 1200px; margin: 0 auto;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem; color: var(--ink);
            text-decoration: none; letter-spacing: -0.02em;
        }

        .logo sup {
            font-family: 'DM Mono', monospace;
            font-size: 0.48rem; color: var(--accent);
            vertical-align: super; letter-spacing: 0.1em; text-transform: uppercase;
        }

        .back-btn {
            font-family: 'DM Mono', monospace; font-size: 0.75rem;
            border: 1.5px solid var(--ink); padding: 8px 18px; border-radius: 3px;
            text-decoration: none; color: var(--ink); letter-spacing: 0.05em;
            display: flex; align-items: center; gap: 8px; transition: all 0.25s;
        }

        .back-btn:hover { background: var(--ink); color: var(--paper); }

        /* ─── MAIN ─── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 7% 80px;
            gap: 28px;
        }

        /* ─── PAGE HEADER ─── */
        .page-header { text-align: center; }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem; color: var(--accent);
            letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px;
        }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: -0.03em; color: var(--ink); line-height: 1;
        }

        .page-header h1 em { font-style: italic; color: var(--accent); }

        .page-header p {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem; color: var(--ink-muted);
            letter-spacing: 0.08em; margin-top: 10px;
        }

        /* ─── CARD ─── */
        .card {
            width: 100%; max-width: 480px;
            background: var(--paper-card);
            border: 1px solid var(--rule);
            border-radius: 6px;
            padding: 36px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ─── TEXTAREA ─── */
        .textarea-wrap { position: relative; }

        .textarea-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem; color: var(--ink-muted);
            letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px;
        }

        .name-count {
            background: var(--paper-warm);
            border: 1px solid var(--rule);
            border-radius: 2px;
            padding: 2px 10px;
            font-size: 0.65rem;
            color: var(--ink-soft);
            letter-spacing: 0.08em;
            transition: all 0.2s;
        }

        .name-count.has-names {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 1.5px solid var(--rule);
            border-radius: 4px;
            background: var(--paper);
            font-family: 'DM Mono', monospace;
            font-size: 0.88rem;
            color: var(--ink);
            padding: 14px 16px;
            resize: none;
            outline: none;
            line-height: 1.7;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--ink); }
        textarea::placeholder { color: rgba(122,118,114,0.45); }

        /* ─── PICK BUTTON ─── */
        .pick-btn {
            width: 100%;
            padding: 15px;
            background: var(--ink);
            color: var(--paper);
            border: none; border-radius: 4px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.25s;
        }

        .pick-btn:hover { background: var(--accent); transform: translateY(-2px); }
        .pick-btn:active { transform: translateY(0); }
        .pick-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ─── DIVIDER ─── */
        .divider { height: 1px; background: var(--rule); margin: 0 -32px; }

        /* ─── RESULT BOX ─── */
        .result-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 8px 0 4px;
            min-height: 80px;
            justify-content: center;
        }

        /* empty state */
        .result-empty {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem; color: var(--ink-muted);
            letter-spacing: 0.1em; text-transform: uppercase;
            text-align: center;
        }

        /* picked name */
        .picked-name {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem; letter-spacing: -0.03em;
            color: var(--ink); line-height: 1; text-align: center;
            display: none;
        }

        .picked-name.show { display: block; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }

        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        .picked-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem; color: var(--accent);
            letter-spacing: 0.14em; text-transform: uppercase;
            display: none;
        }

        .picked-label.show { display: block; }

        /* remaining count */
        .remaining {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem; color: var(--ink-muted);
            letter-spacing: 0.1em; text-transform: uppercase;
            display: none;
        }

        .remaining.show { display: block; }

        /* ─── ACTION BUTTONS ─── */
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            display: none;
        }

        .action-row.show { display: grid; }

        .action-btn {
            padding: 11px;
            border-radius: 3px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }

        .btn-remove {
            background: transparent;
            border: 1.5px solid var(--rule);
            color: var(--ink-muted);
        }

        .btn-remove:hover { border-color: var(--accent); color: var(--accent); }

        .btn-again {
            background: var(--paper-warm);
            border: 1.5px solid var(--rule);
            color: var(--ink-soft);
        }

        .btn-again:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }

        /* ─── RESET ─── */
        .reset-btn {
            width: 100%; max-width: 480px;
            padding: 12px;
            background: transparent;
            border: 1.5px solid var(--rule);
            border-radius: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--ink-muted); cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ─── FOOTER ─── */
        footer {
            border-top: 1px solid var(--rule);
            padding: 22px 7%;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto; width: 100%;
        }

        footer p { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.08em; }
        footer span { color: var(--accent); }

        @media (max-width: 500px) {
            .card { padding: 28px 22px; }
            .divider { margin: 0 -22px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="../../index.html" class="logo">Sareena Rahim<sup>dev</sup></a>
            <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Tools</a>
        </nav>
    </header>

    <main>

        <div class="page-header">
            <div class="eyebrow">Tool 07</div>
            <h1>Random <em>Name Picker</em></h1>
            <p>Paste names, click pick — one is chosen at random.</p>
        </div>

        <div class="card">

            <!-- Textarea -->
            <div class="textarea-wrap">
                <div class="textarea-label">
                    <span>Names — one per line</span>
                    <span class="name-count" id="nameCount">0 names</span>
                </div>
                <textarea id="nameInput" placeholder="Alice&#10;Bob&#10;Charlie&#10;Diana&#10;..." oninput="updateCount()"></textarea>
            </div>

            <!-- Pick button -->
            <button class="pick-btn" id="pickBtn" onclick="pickName()" disabled>
                <i class="fas fa-shuffle"></i> Pick a Name
            </button>

            <div class="divider"></div>

            <!-- Result -->
            <div class="result-box">
                <div class="result-empty" id="emptyState">Enter names above to get started</div>
                <div class="picked-label" id="pickedLabel">🎉 Selected</div>
                <div class="picked-name" id="pickedName"></div>
                <div class="remaining" id="remaining"></div>
            </div>

            <!-- Remove & Pick Again -->
            <div class="action-row" id="actionRow">
                <button class="action-btn btn-remove" onclick="removePicked()">
                    <i class="fas fa-xmark"></i> Remove
                </button>
                <button class="action-btn btn-again" onclick="pickName()">
                    <i class="fas fa-rotate-right"></i> Pick Again
                </button>
            </div>

        </div>

        <button class="reset-btn" onclick="resetAll()">
            <i class="fas fa-rotate-right"></i> Reset
        </button>

    </main>

    <footer>
        <p>© 2026 Sareena Rahim</p>
        <p>Part of <span>·</span>
            <a href="../../index.html" style="color:var(--ink-muted); text-decoration:none; transition:color 0.2s;"
               onmouseover="this.style.color='var(--accent)'"
               onmouseout="this.style.color='var(--ink-muted)'">sareenarahim.dev</a>
        </p>
    </footer>

    <script>
        // ─── STATE ────────────────────────────────────────────────────────
        let names      = [];   // current list of names
        let lastPicked = '';   // most recently picked name

        // ─── LIVE COUNT ───────────────────────────────────────────────────
        function updateCount() {
            names = getNames();
            const count   = names.length;
            const badge   = document.getElementById('nameCount');
            badge.textContent = count + (count === 1 ? ' name' : ' names');
            badge.className   = 'name-count' + (count > 0 ? ' has-names' : '');
            document.getElementById('pickBtn').disabled = count === 0;
        }

        // ─── PARSE NAMES from textarea ────────────────────────────────────
        function getNames() {
            return document.getElementById('nameInput').value
                .split('\n')
                .map(n => n.trim())
                .filter(n => n.length > 0);
        }

        // ─── PICK RANDOM NAME ─────────────────────────────────────────────
        function pickName() {
            names = getNames();
            if (names.length === 0) return;

            // Math.random() × array length → random index
            const idx    = Math.floor(Math.random() * names.length);
            lastPicked   = names[idx];

            // Show result
            const el = document.getElementById('pickedName');
            el.textContent = lastPicked;
            el.className   = 'picked-name'; // reset animation
            void el.offsetWidth;            // force reflow
            el.className   = 'picked-name show';

            document.getElementById('pickedLabel').className = 'picked-label show';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('actionRow').className = 'action-row show';

            updateRemaining(names.length);
        }

        // ─── REMOVE PICKED & PICK AGAIN ───────────────────────────────────
        function removePicked() {
            // Filter out the picked name (first occurrence)
            let removed = false;
            const lines = document.getElementById('nameInput').value
                .split('\n')
                .filter(line => {
                    if (!removed && line.trim() === lastPicked) {
                        removed = true;
                        return false;
                    }
                    return true;
                });

            document.getElementById('nameInput').value = lines.join('\n');
            updateCount();

            names = getNames();
            if (names.length === 0) {
                // No names left
                document.getElementById('pickedName').className  = 'picked-name';
                document.getElementById('pickedLabel').className = 'picked-label';
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').textContent = 'No more names!';
                document.getElementById('actionRow').className   = 'action-row';
                document.getElementById('remaining').className   = 'remaining';
            } else {
                pickName();
            }
        }

        // ─── REMAINING COUNT ──────────────────────────────────────────────
        function updateRemaining(total) {
            const rem = document.getElementById('remaining');
            rem.className   = 'remaining show';
            rem.textContent = total + (total === 1 ? ' name' : ' names') + ' in pool';
        }

        // ─── RESET ────────────────────────────────────────────────────────
        function resetAll() {
            document.getElementById('nameInput').value  = '';
            document.getElementById('pickedName').className  = 'picked-name';
            document.getElementById('pickedLabel').className = 'picked-label';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('emptyState').textContent  = 'Enter names above to get started';
            document.getElementById('actionRow').className  = 'action-row';
            document.getElementById('remaining').className  = 'remaining';
            document.getElementById('nameCount').textContent = '0 names';
            document.getElementById('nameCount').className  = 'name-count';
            document.getElementById('pickBtn').disabled = true;
            names = []; lastPicked = '';
        }
    </script>

</body>
</html>
